<!DOCTYPE html>
<html>
<head>
  <title>25th Anniversary 💙</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: linear-gradient(to bottom, #b3e5fc, #e1f5fe);
      font-family: Arial, sans-serif;
      color: #01579b;
    }

    /* CENTER CONTAINER */
    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: 28px;
    }

    p {
      font-size: 18px;
    }

    button {
      width: 100%;
      font-size: 18px;
      padding: 15px;
      margin: 12px 0;
      border: none;
      border-radius: 25px;
      background-color: #0288d1;
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    button:active {
      transform: scale(0.97);
    }

    .hidden {
      display: none;
    }

    .items {
      font-size: 45px;
      margin-top: 20px;
    }

    .items span {
      margin: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .items span.selected {
      opacity: 0.5;
      transform: scale(0.9);
    }

    video {
      width: 100%;
      margin-top: 20px;
      border-radius: 15px;
    }

    /* DESKTOP IMPROVEMENT */
    @media (min-width: 768px) {
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>💙 25 Years. One Beautiful Journey 💙</h1>

    <p>Ready for a little surprise? 👀</p>

    <button onclick="showStory()">Start the Story 💫</button>
    <p id="story" class="hidden"></p>

    <button onclick="showHint()">Guess What’s Next? 👀</button>
    <p id="hint" class="hidden"></p>

    <button onclick="showPack()">Pack Your Bag 🎒</button>

    <div id="packSection" class="hidden">
      <p>Tap below emojis to pack your bag 💦</p>

      <div class="items">
        <span onclick="addItem(this)">👙</span>
        <span onclick="addItem(this)">🍹</span>
        <span onclick="addItem(this)">🕶️</span>
        <span onclick="addItem(this)">🧴</span>
        <span onclick="addItem(this)">🩴</span>
      </div>

      <p id="bagStatus">Bag is empty 👀</p>
    </div>

    <div id="videoSection" class="hidden">
      <p>💙 Here’s Your Surprise 💙</p>

      <button onclick="playVideo()">Play Video 🎥</button>

      <video id="myVideo" controls playsinline>
        <source src="video.mp4" type="video/mp4">
      </video>

      <button id="mapBtn" class="hidden" onclick="openMap()">
        Tap below to get directions 📍
      </button>
    </div>

  </div>

  <script>
    function showStory() {
      document.getElementById("story").classList.remove("hidden");
      document.getElementById("story").innerHTML =
        "From stolen glances… to building a lifetime together 💙<br>25 years later, the love still feels brand new 🥹";
    }

    function showHint() {
      document.getElementById("hint").classList.remove("hidden");
      document.getElementById("hint").innerHTML =
        "Pack your bags… bring your smiles… and don’t forget your swimsuits 🏊‍♂️💦";
    }

    function showPack() {
      document.getElementById("packSection").classList.remove("hidden");
    }

    let count = 0;

    function addItem(el) {
      if (!el.classList.contains("selected")) {
        el.classList.add("selected");
        count++;
      }

      if (count >= 2) {
        document.getElementById("bagStatus").innerHTML =
          "Bag packed! Let’s gooo 💙🏝";
        document.getElementById("videoSection").classList.remove("hidden");
      } else {
        document.getElementById("bagStatus").innerHTML =
          "Keep packing... 💦";
      }
    }

    function playVideo() {
      document.getElementById("myVideo").play();
    }

    function openMap() {
      window.open("https://maps.app.goo.gl/2j4PzAgsWQzouuLU8", "_blank");
    }

    document.getElementById("myVideo").addEventListener("ended", function() {
      document.getElementById("mapBtn").classList.remove("hidden");
    });
  </script>

</body>
</html>
